<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.js"></script>
    <title>World Clock</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select id="city">
        <option value="" disabled selected>Select a city</option>
        <option value="sydney">Sydney</option>
        <option value="los-angeles">Los Angeles</option>
        <option value="tokyo">Tokyo</option>
        <option value="paris">Paris</option>
      </select>
      <div class="display-time">
        <div class="city-element">
          <div class="city">Sydney <span class="country">AU</span></div>
          <div class="date" id="sydneyDateElement">Saturday 20 March 2026</div>
        </div>
        <div class="time-element" id="sydneyTimeElement">10:33:45 am</div>
      </div>
      <div class="display-time">
        <div class="city-element">
          <div class="city">Los Angeles <span class="country">US</span></div>
          <div class="date">Saturday 20 March 2026</div>
        </div>
        <div class="time-element">10:33:45 am</div>
      </div>
      <div class="display-time">
        <div class="city-element">
          <div class="city">Tokyo <span class="country">JP</span></div>
          <div class="date">Saturday 20 March 2026</div>
        </div>
        <div class="time-element">10:33:45 am</div>
      </div>
      <div class="display-time">
        <div class="city-element">
          <div class="city">Paris <span class="country">FR</span></div>
          <div class="date">Saturday 20 March 2026</div>
        </div>
        <div class="time-element">10:33:45 am</div>
      </div>
      <footer>
        <small>
          This project is coded by
          <a href="https://github.com/lauren-ana" target="_blank"
            >Lauren Hohepa</a
          >, is open sourced on
          <a href="https://github.com/lauren-ana/world-clock" target="_blank"
            >GitHub</a
          >
          and hosted on
          <a href="https://www.netlify.com/" target="_blank">Netlify</a>.</small
        >
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
